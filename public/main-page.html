<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LIQUID // MAIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; color: white; }
    #v-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
    video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
    
    .container { position: relative; z-index: 2; height: 100vh; display: flex; justify-content: center; align-items: center; }
    .card {
      background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1); padding: 50px; border-radius: 24px;
      text-align: center; max-width: 450px; width: 90%; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    }
    h1 { font-size: 3rem; font-weight: 900; margin: 0; letter-spacing: -1px; text-transform: uppercase; }
    .tagline { color: #888; font-size: 0.8rem; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }

    .feature-box {
      background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px; padding: 20px; margin-bottom: 30px; text-align: left;
    }
    .feature-header { display: block; font-size: 0.7rem; font-weight: 900; color: #555; margin-bottom: 12px; letter-spacing: 2px; }
    .feature-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; list-style: none; padding: 0; margin: 0; }
    .feature-item { font-size: 0.75rem; color: #efefef; display: flex; align-items: center; gap: 8px; font-weight: 600; }
    .feature-item::before { content: ''; width: 4px; height: 4px; background: #fff; border-radius: 50%; }

    .stats-row { 
      display: flex; justify-content: space-between; margin-top: 15px; 
      padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05);
    }
    .stat-block { text-align: left; }
    .stat-label { display: block; font-size: 0.6rem; color: #444; font-weight: 900; letter-spacing: 1px; }
    .stat-number { font-size: 1.2rem; font-weight: 900; color: #fff; }

    .btn-group { display: flex; flex-direction: column; gap: 12px; }
    .primary-btn {
      padding: 18px; background: #fff; color: #000; text-decoration: none; 
      font-weight: 900; border-radius: 12px; transition: 0.3s;
      text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem;
    }
    .primary-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
    
    .secondary-btn {
      padding: 15px; background: transparent; color: #fff; text-decoration: none; 
      font-weight: 700; border-radius: 12px; transition: 0.3s;
      text-transform: uppercase; letter-spacing: 1px; font-size: 0.7rem;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .secondary-btn:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>

<div id="v-bg">
  <video id="vid" autoplay loop muted playsinline>
    <source src="https://consoletest-peach.vercel.app/files/hamburger.mp4" type="video/mp4">
  </video>
</div>

<div class="container">
  <div class="card">
    <h1>LIQUID.CLIENT</h1>
    <div class="tagline">Simply better.</div>

    <div class="feature-box">
      <span class="feature-header">INFO</span>
      <ul class="feature-list">
        <li class="feature-item">Clean UI</li>
        <li class="feature-item">Optimized</li>
        <li class="feature-item">Custom Sounds</li>
        <li class="feature-item">OP Mods</li>
      </ul>
      
      <div class="stats-row">
        <div class="stat-block">
          <span class="stat-label">TOTAL USERS</span>
          <span class="stat-number" id="total-u">0</span>
        </div>
        <div class="stat-block">
          <span class="stat-label">PEAK ONLINE</span>
          <span class="stat-number" id="peak-u">0</span>
        </div>
      </div>
    </div>

    <div class="btn-group">
      <a href="/download" class="primary-btn">Download</a>
      <a href="/dash" class="secondary-btn">Dashboard</a>
    </div>
  </div>
</div>

<script>
const v = document.getElementById("vid");
let armed = false;
let done = false;

setTimeout(() => { armed = true; }, 500);

function wake() {
  if (!armed || done) return;
  done = true;
  v.muted = false;
  v.play().catch(() => {});
  events.forEach(e => document.removeEventListener(e, wake));
}

async function syncStats() {
  try {
    const r = await fetch('/dash', { headers: { 'x-requested-with': 'XMLHttpRequest' } });
    const d = await r.json();
    document.getElementById('total-u').innerText = d.visitorCount;
    document.getElementById('peak-u').innerText = d.peakVisitors;
  } catch (e) {}
}

const events = ["click","keydown","mousemove","touchstart","wheel","pointerdown"];
events.forEach(e => document.addEventListener(e, wake));

setInterval(syncStats, 5000);
syncStats();

setInterval(() => {
    fetch(window.location.href);
}, 45000);
</script>

</body>
</html>
